<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>用户id登录 — 女娲数字人</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body { background: var(--dark); min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 40px 24px; position: relative; overflow: hidden; }

    body::before {
      content: '';
      position: fixed; inset: 0;
      background:
        radial-gradient(ellipse 600px 600px at 80% -10%, rgba(99,102,241,.25) 0%, transparent 60%),
        radial-gradient(ellipse 400px 400px at -10% 80%, rgba(236,72,153,.2) 0%, transparent 60%);
      pointer-events: none;
    }

    .login-container {
      display: flex;
      width: 100%;
      max-width: 960px;
      min-height: 560px;
      border-radius: 28px;
      overflow: hidden;
      box-shadow: 0 40px 100px rgba(0,0,0,.5);
      position: relative;
      z-index: 1;
    }

    /* Left panel */
    .login-left {
      flex: 1;
      background: linear-gradient(135deg, #7c3aed 0%, #6366f1 50%, #ec4899 100%);
      padding: 48px 40px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
    }
    .ll-logo { display: flex; align-items: center; gap: 8px; color: #fff; font-weight: 800; font-size: 18px; }
    .ll-logo .logo-icon { font-size: 20px; }
    .ll-content { color: #fff; }
    .ll-title { font-size: 30px; font-weight: 800; line-height: 1.3; margin-bottom: 16px; }
    .ll-desc { font-size: 14px; opacity: .75; line-height: 1.8; }
    .ll-notice {
      margin-top: 28px;
      background: rgba(255,255,255,.12);
      border-radius: 12px;
      padding: 16px 18px;
      font-size: 13px;
      color: rgba(255,255,255,.9);
      line-height: 1.7;
    }
    .ll-notice strong { display: block; margin-bottom: 6px; font-size: 14px; }
    .ll-bottom { font-size: 12px; color: rgba(255,255,255,.4); }

    @media (max-width: 700px) { .login-left { display: none; } }

    /* Right panel */
    .login-right {
      background: #fff;
      width: 440px;
      flex-shrink: 0;
      padding: 48px 44px;
      display: flex;
      flex-direction: column;
    }
    @media (max-width: 700px) { .login-right { width: 100%; } }

    .lr-back { font-size: 13px; color: var(--text-muted); cursor: pointer; display: flex; align-items: center; gap: 4px; margin-bottom: 32px; transition: color .2s; text-decoration: none; }
    .lr-back:hover { color: var(--primary); }

    .lr-title { font-size: 26px; font-weight: 800; color: #0f172a; margin-bottom: 6px; }
    .lr-sub { font-size: 14px; color: var(--text-muted); margin-bottom: 32px; line-height: 1.6; }

    /* Form */
    .form-group { margin-bottom: 18px; }
    .form-label { font-size: 13px; font-weight: 600; color: #374151; margin-bottom: 6px; display: block; }
    .form-input {
      width: 100%;
      padding: 13px 14px;
      border: 1.5px solid var(--border);
      border-radius: 10px;
      font-size: 14px;
      color: #0f172a;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
      background: #fff;
      box-sizing: border-box;
    }
    .form-input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(99,102,241,.1); }
    .form-input.error { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(244,63,94,.1); }

    .error-msg { font-size: 12px; color: var(--accent); margin-top: 5px; display: none; }
    .error-msg.show { display: block; }

    /* Submit btn */
    .btn-submit {
      width: 100%;
      padding: 14px;
      background: var(--gradient);
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      transition: all .2s;
      box-shadow: 0 4px 20px rgba(99,102,241,.3);
      margin-bottom: 16px;
    }
    .btn-submit:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(99,102,241,.4); }
    .btn-submit:active { transform: translateY(0); }
    .btn-submit:disabled { opacity: .6; cursor: not-allowed; transform: none; }

    /* Loading spinner */
    .spinner {
      display: inline-block;
      width: 16px; height: 16px;
      border: 2px solid rgba(255,255,255,.4);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin .6s linear infinite;
      vertical-align: middle;
      margin-right: 6px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== 名额暂未开放 错误状态 ===== */
    .not-in-pool {
      display: none;
      text-align: center;
      padding: 20px 0;
      animation: fadeIn .3s;
    }
    .not-in-pool.show { display: block; }

    .pool-icon {
      font-size: 48px;
      margin-bottom: 16px;
      line-height: 1;
    }
    .pool-title {
      font-size: 20px;
      font-weight: 800;
      color: #0f172a;
      margin-bottom: 10px;
    }
    .pool-desc {
      font-size: 14px;
      color: var(--text-muted);
      line-height: 1.7;
      margin-bottom: 28px;
    }
    .pool-desc strong {
      color: #374151;
      font-weight: 600;
    }
    .btn-pool-adv {
      display: block;
      width: 100%;
      padding: 14px;
      background: var(--gradient);
      color: #fff;
      font-size: 15px;
      font-weight: 700;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      text-decoration: none;
      margin-bottom: 12px;
      transition: all .2s;
      box-shadow: 0 4px 20px rgba(99,102,241,.3);
    }
    .btn-pool-adv:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(99,102,241,.4); }
    .btn-pool-retry {
      font-size: 13px;
      color: var(--primary);
      cursor: pointer;
      font-weight: 600;
      background: none;
      border: none;
      padding: 6px;
    }
    .btn-pool-retry:hover { text-decoration: underline; }

    /* 协议 */
    .agreement { font-size: 12px; color: var(--text-muted); text-align: center; margin-top: 8px; line-height: 1.7; }
    .agreement a { color: var(--primary); }

    /* 原型演示区 */
    .demo-selector {
      margin-top: 24px;
      padding: 16px;
      background: #fff8f0;
      border: 1px solid #fed7aa;
      border-radius: 12px;
      font-size: 12px;
    }
    .demo-selector p { font-weight: 600; color: #92400e; margin-bottom: 10px; }
    .demo-selector select {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #fed7aa;
      border-radius: 8px;
      font-size: 13px;
      color: #374151;
      background: #fff;
      margin-bottom: 8px;
    }
    .demo-selector button {
      width: 100%;
      padding: 8px;
      background: #f59e0b;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="login-container">

    <!-- Left panel -->
    <div class="login-left">
      <div class="ll-logo">
        <span class="logo-icon">✦</span>
        <span>女娲数字人</span>
      </div>
      <div class="ll-content">
        <h2 class="ll-title">内测用户<br />专属通道</h2>
        <p class="ll-desc">受邀参与早期内测的用户<br />可通过快手用户id直接登录使用</p>
        <div class="ll-notice">
          <strong>📌 关于用户id登录</strong>
          此通道仅对受邀内测用户开放。如您尚未收到邀请，可申请成为广告主后通过广告主账号使用完整功能。
        </div>
      </div>
      <div class="ll-bottom">女娲数字人 · 内测专属</div>
    </div>

    <!-- Right login panel -->
    <div class="login-right">
      <a href="login-entry.html" class="lr-back">← 返回</a>

      <!-- ===== 登录表单（默认显示） ===== -->
      <div id="loginForm">
        <h1 class="lr-title">用户id登录</h1>
        <p class="lr-sub">输入您的快手用户id<br />系统将自动核验内测资格</p>

        <div class="form-group">
          <label class="form-label">快手用户id</label>
          <input
            type="text"
            class="form-input"
            id="userId"
            placeholder="请输入快手用户id（如：kwai_123456）"
            oninput="clearUserIdErr()"
            autocomplete="off"
          />
          <div class="error-msg" id="userIdErr"></div>
        </div>

        <div class="error-msg" id="globalErr" style="margin-bottom:12px; text-align:center;"></div>

        <button class="btn-submit" id="submitBtn" onclick="handleSubmit()">验证并登录</button>

        <p class="agreement">登录即代表同意 <a href="terms.html">用户协议</a> 与 <a href="privacy.html">隐私政策</a></p>

        <!-- 原型演示 -->
        <div class="demo-selector">
          <p>🧪 原型模拟（选择核验结果）</p>
          <select id="demoResult">
            <option value="inPool">模拟：在名单内 → 登录成功</option>
            <option value="notInPool">模拟：不在名单内 → 名额暂未开放</option>
          </select>
          <button onclick="runDemo()">模拟核验</button>
        </div>
      </div>

      <!-- ===== 名额暂未开放（错误态） ===== -->
      <div class="not-in-pool" id="notInPoolPanel">
        <div class="pool-icon">🚫</div>
        <div class="pool-title">名额暂未开放</div>
        <div class="pool-desc">
          很抱歉，您的用户id <strong id="rejectedId"></strong> 暂不在内测名单内。<br />
          目前内测名额有限，敬请期待后续开放。
        </div>

        <a href="login.html" class="btn-pool-adv">改用广告主账号登录</a>
        <button class="btn-pool-retry" onclick="retryLogin()">← 重新输入用户id</button>
      </div>

    </div>
  </div>

  <script src="app.js"></script>
  <script>
    function clearUserIdErr() {
      const el = document.getElementById('userIdErr');
      el.textContent = '';
      el.classList.remove('show');
      document.getElementById('userId').classList.remove('error');
      document.getElementById('globalErr').textContent = '';
      document.getElementById('globalErr').classList.remove('show');
    }

    function handleSubmit() {
      const uid = document.getElementById('userId').value.trim();
      if (!uid) {
        const el = document.getElementById('userIdErr');
        el.textContent = '请输入快手用户id';
        el.classList.add('show');
        document.getElementById('userId').classList.add('error');
        return;
      }

      // 显示 loading
      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>核验中...';

      // 演示：根据演示选择器决定结果
      const demoResult = document.getElementById('demoResult').value;
      setTimeout(() => {
        btn.disabled = false;
        btn.innerHTML = '验证并登录';
        if (demoResult === 'inPool') {
          loginSuccess();
        } else {
          showNotInPool(uid);
        }
      }, 1400);
    }

    function runDemo() {
      const uid = document.getElementById('userId').value.trim() || 'kwai_demo123';
      document.getElementById('userId').value = uid;

      const demoResult = document.getElementById('demoResult').value;
      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.innerHTML = '<span class="spinner"></span>核验中...';

      setTimeout(() => {
        btn.disabled = false;
        btn.innerHTML = '验证并登录';
        if (demoResult === 'inPool') {
          loginSuccess();
        } else {
          showNotInPool(uid);
        }
      }, 1400);
    }

    function loginSuccess() {
      // 用户id登录成功，视为低消耗普通用户
      const state = JSON.parse(sessionStorage.getItem('nvwaState') || '{}');
      state.isLoggedIn = true;
      state.spending = 50;
      state.userType = 'userId';
      state.versionChosen = false;
      state.userVersion = null;
      state.unreadCount = 3;
      sessionStorage.setItem('nvwaState', JSON.stringify(state));
      window.location.href = 'index.html?loginDone=1&spending=50';
    }

    function showNotInPool(uid) {
      document.getElementById('loginForm').style.display = 'none';
      document.getElementById('rejectedId').textContent = uid;
      document.getElementById('notInPoolPanel').classList.add('show');
    }

    function retryLogin() {
      document.getElementById('notInPoolPanel').classList.remove('show');
      document.getElementById('loginForm').style.display = 'block';
      document.getElementById('userId').value = '';
      clearUserIdErr();
    }
  </script>
</body>
</html>
